<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intan — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="page-overlay"></div>

  <nav id="glass-nav">
    <a href="index.html" class="nav-item" data-label="Home" data-page-index="0">
      <img src="images/homeicon.png" alt="Home" />
    </a>
    <a href="blog.html" class="nav-item" data-label="Blog" data-page-index="1">
      <img src="images/blogicon.png" alt="Blog" />
    </a>
    <a href="gallery.html" class="nav-item" data-label="Gallery" data-page-index="2">
      <img src="images/galleryicon.png" alt="Gallery" />
    </a>
    <a href="contact.html" class="nav-item active" data-label="Contact" data-page-index="3">
      <img src="images/contacticon.png" alt="Contact" />
    </a>
  </nav>

  <div id="page-wrapper">

    <div id="contact-wrapper">
      <div id="contact-card">

        <div class="card-header">
          <h1>My Contacts</h1>
          <p>Available for project offers and friends</p>
        </div>

        <div class="card-body">

          <a href="https://www.instagram.com/aganeialia?igsh=N2h1cno2ZDFxcmN6&utm_source=qr" class="contact-row" target="_blank" rel="noopener">
            <div class="row-icon">
              <img src="https://api.iconify.design/ph/instagram-logo-fill.svg?color=%23d4af8a&width=24&height=24" alt="Instagram" />
            </div>
            <div class="row-info">
              <p class="row-platform">Instagram</p>
              <p class="row-handle">@aganeialia</p>
            </div>
            <span class="row-arrow">→</span>
          </a>

          <a href="https://tiktok.com/@shark" class="contact-row" target="_blank" rel="noopener">
            <div class="row-icon">
              <img src="https://api.iconify.design/ph/tiktok-logo-fill.svg?color=%23d4af8a&width=24&height=24" alt="TikTok" />
            </div>
            <div class="row-info">
              <p class="row-platform">TikTok</p>
              <p class="row-handle">@shark</p>
            </div>
            <span class="row-arrow">→</span>
          </a>

          <a href="https://wa.me/6285824235934" class="contact-row" target="_blank" rel="noopener">
            <div class="row-icon">
              <img src="https://api.iconify.design/ph/whatsapp-logo-fill.svg?color=%23d4af8a&width=24&height=24" alt="WhatsApp" />
            </div>
            <div class="row-info">
              <p class="row-platform">WhatsApp</p>
              <p class="row-handle">+62 858-2423-5934</p>
            </div>
            <span class="row-arrow">→</span>
          </a>

        </div>
      </div>
    </div>

    <div class="bubble-layer">

      <div class="bubble"
           style="width:180px;height:180px;left:3%;top:18%;
                  animation-duration:7.6s;animation-delay:-1.8s;"
           data-parallax-speed="0.016">
        <img src="images/bubble4.png" alt="" />
      </div>

      <div class="bubble"
           style="width:130px;height:130px;left:4%;bottom:16%;
                  animation-duration:5.9s;animation-delay:-4.6s;"
           data-parallax-speed="0.024">
        <img src="images/bubble2.png" alt="" />
      </div>

      <div class="bubble"
           style="width:160px;height:160px;right:3%;top:16%;
                  animation-duration:6.5s;animation-delay:-0.6s;"
           data-parallax-speed="0.02"
           data-parallax-invert="true">
        <img src="images/bubble6.png" alt="" />
      </div>

      <div class="bubble"
           style="width:110px;height:110px;right:5%;top:50%;
                  animation-duration:4.8s;animation-delay:-3.1s;"
           data-parallax-speed="0.03"
           data-parallax-invert="true">
        <img src="images/bubble3.png" alt="" />
      </div>

      <div class="bubble"
           style="width:140px;height:140px;left:46%;top:6%;
                  animation-duration:8.2s;animation-delay:-6.0s;"
           data-parallax-speed="0.012">
        <img src="images/bubble1.png" alt="" />
      </div>

      <div class="bubble"
           style="width:155px;height:155px;right:22%;bottom:5%;
                  animation-duration:7.0s;animation-delay:-2.4s;"
           data-parallax-speed="0.018"
           data-parallax-invert="true">
        <img src="images/bubble5.png" alt="" />
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
